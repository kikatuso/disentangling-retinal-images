output_dir: ./outputs
experiment_folder: ukb_vessel_dcor

gpus: [0]
max_epoch: 200

# Lightning trainer.
val_check_percent: 1.0
val_check_interval: 2
monitor_metric: val_overall_loss
monitor_mode: min

seed:
sanity_steps: 0
resume:

data:
  image_dir: '/gpfs3/well/papiez/users/zwk579/.temp_data/256x256px/'
  feature_path: '/gpfs3/well/papiez/users/zwk579/.temp_data/256x256px/recomputed_28_04_2026.csv'
  index_col: 'path'
  image_size: 256
  column_names: ['vessel_density','fractal_dimension','average_width','distance_tortuosity','squared_curvature_tortuosity','tortuosity_density']
  img_extension: .png
  subfolder_search: true
  fullpath_in_index: true
  batch_size: 14
  num_workers: 8
  prefetch_factor: 2

  split_ratios:
    train: 0.70
    val: 0.15
    test: 0.15
  split_seed: 42
  stratify_on: ['vessel_density','fractal_dimension','average_width','distance_tortuosity','squared_curvature_tortuosity','tortuosity_density']
  n_quantiles: 4

  # No conditional GAN labels
  conditional_labels:
  # One regression target per feature — each gets its own subspace
  classifier_labels: ['vessel_density','fractal_dimension','average_width','distance_tortuosity','squared_curvature_tortuosity','tortuosity_density']

# Loss weighting terms.
lambda_plp: 2
lambda_enc_fake: 1
lambda_enc_real: 2
lambda_subspace_cs: 0.04
lambda_distance_correlation: 0.04

# Model parameters.
generator: stylegan2
latent_dim: 32
num_mapping_layers: 8
lr_g: 0.0025
lr_d: 0.0025
lazy_gradient_penalty_interval: 8
lazy_path_penalty_after: 0
lazy_path_penalty_interval: 2

cycle_consistency: True
seperate_mapping_networks: True
buffer_size: 4

# Subspace heads — one dim per feature, all regression since dim==1
# subspace_dims must sum to <= latent_dim (32)
# Remaining dims (32 - sum) become the free/unstructured subspace
classifier:
  linear: True
  subspace_dims: [4, 4, 4, 4, 4, 4]  # 6 subspaces x 4 dims = 24, leaving 8 free
  hidden_layers:

# Disable augmentation
ada_start_p: -1
ada_target: 0.6
ada_interval: 4
ada_fixed: False

num_vis_images: 64